name: RDP Roblox Studio

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:

      - name: Enable Remote Desktop
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Create RDP User
        run: |
          $password = -join ((33..126) | Get-Random -Count 16 | % {[char]$_})
          $secure = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $secure -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"

          echo "RDP_USER=RDP" >> $env:GITHUB_ENV
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV

      - name: Install Tailscale
        run: |
          choco install tailscale -y

      - name: Connect Tailscale
        run: |
          tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=github-rdp-${{ github.run_id }}

      - name: Get Tailscale IP
        run: |
          $ip = tailscale ip -4
          echo "TS_IP=$ip" >> $env:GITHUB_ENV

      - name: Install Roblox Studio
        run: |
          Invoke-WebRequest https://setup.rbxcdn.com/RobloxStudioLauncherBeta.exe -OutFile studio.exe
          Start-Process .\studio.exe -ArgumentList "/silent" -Wait

      - name: Show RDP Info
        run: |
          Write-Host ""
          Write-Host "=============================="
          Write-Host " RDP CONNECTION DETAILS"
          Write-Host "=============================="
          Write-Host "Address: $env:TS_IP"
          Write-Host "Username: $env:RDP_USER"
          Write-Host "Password: $env:RDP_PASS"
          Write-Host "=============================="

      - name: Keep Runner Alive
        run: |
          while ($true) {
            Write-Host "RDP still running..."
            Start-Sleep -Seconds 300
          }
