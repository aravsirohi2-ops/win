name: Fast Tailscale RDP

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:

    - name: Enable Remote Desktop
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

    - name: Create User
      run: |
        $pass = ConvertTo-SecureString "RdpPass123!" -AsPlainText -Force
        New-LocalUser "rdp" -Password $pass
        Add-LocalGroupMember -Group "Administrators" -Member "rdp"
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member "rdp"

    - name: Install Tailscale
      run: |
        Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe -OutFile tailscale.exe
        Start-Process .\tailscale.exe -ArgumentList "/S" -Wait

    - name: Connect Tailscale
      run: |
        & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }}

    - name: Show RDP Info
      run: |
        $ip=& "C:\Program Files\Tailscale\tailscale.exe" ip -4
        Write-Host ""
        Write-Host "======================="
        Write-Host "RDP READY"
        Write-Host "IP: $ip"
        Write-Host "User: rdp"
        Write-Host "Password: RdpPass123!"
        Write-Host "======================="

    - name: Keep Alive
      run: |
        while ($true) {
          Start-Sleep 300
        }
