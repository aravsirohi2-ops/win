name: Tailscale RDP 12H

on:
  workflow_dispatch:

jobs:

  rdp1:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:

    - name: Enable Remote Desktop
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name fDenyTSConnections -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

    - name: Create RDP User
      run: |
        $pass = ConvertTo-SecureString "StrongPass123!" -AsPlainText -Force
        New-LocalUser "rdpuser" -Password $pass
        Add-LocalGroupMember -Group "Administrators" -Member "rdpuser"
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member "rdpuser"

    - name: Install Tailscale
      run: |
        choco install tailscale -y

    - name: Connect Tailscale
      run: |
        & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }}

    - name: Show Login Info
      run: |
        Write-Host "==== RUNNER 1 READY ===="
        & "C:\Program Files\Tailscale\tailscale.exe" ip -4
        Write-Host "User: rdpuser"
        Write-Host "Password: StrongPass123!"

    - name: Keep Runner Alive
      run: |
        while ($true) { Start-Sleep 300 }


