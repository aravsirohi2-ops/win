name: Roblox Studio RDP

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:

    - name: Enable Remote Desktop
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

    - name: Create RDP User
      run: |
        net user rdp 12345 /add
        net localgroup administrators rdp /add
        net localgroup "Remote Desktop Users" rdp /add

    - name: Install Tailscale
      run: |
        Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe -OutFile tailscale.exe
        Start-Process .\tailscale.exe -ArgumentList "/S" -Wait

    - name: Connect Tailscale
      run: |
        & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }}

    - name: Get Tailscale IP
      run: |
        $ip=& "C:\Program Files\Tailscale\tailscale.exe" ip -4
        echo "TS_IP=$ip" >> $env:GITHUB_ENV

    - name: Install Roblox Studio
      run: |
        Invoke-WebRequest https://setup.rbxcdn.com/RobloxStudioLauncherBeta.exe -OutFile studio.exe
        Start-Process .\studio.exe -Wait

    - name: Show RDP Info
      run: |
        Write-Host ""
        Write-Host "========================"
        Write-Host "RDP LOGIN"
        Write-Host "IP: $env:TS_IP"
        Write-Host "User: AS"
        Write-Host "Password: 12345"
        Write-Host "========================"

    - name: Keep Runner Alive
      run: |
        while ($true) { Start-Sleep -Seconds 300 }
